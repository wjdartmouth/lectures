name: Deploy Slidev to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: pnpm install

      
      - run: |
          pnpm exec slidev build slides.md --base /lectures/ --out dist
          pnpm exec slidev build Year9_English_ReviewSessions_Slidev.md --base /lectures/part2/ --out dist/part2
          cat > dist/index.html << 'EOF'
          <html><body style="font-family:sans-serif;padding:2rem">
          <h1>My Slides</h1>
          <ul>
            <li><a href="./">Main Deck</a></li>
            <li><a href="part2/">Part 2</a></li>
          </ul>
          </body></html>
          EOF
      

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - id: deployment
        uses: actions/deploy-pages@v4
